<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .songti { font-family: "Songti SC","SimSun","Noto Serif SC","Noto Serif CJK SC",serif; }
      .kaiti  { font-family: "Kaiti SC","KaiTi","STKaiti","Noto Serif CJK SC",serif; }
      .hei    { font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC","Noto Sans CJK SC",sans-serif; }
      .ink { fill:#3a2a10; } .red { fill:#c8161d; } .gold { fill:#b8860b; } .gray { fill:#8a8a8a; }
    </style>
    <path id="be-arc" d="M 795 1190 a 100 100 0 1 1 200 0"/>
  </defs>

  <!-- 奖状底:米金色 + 双层花边框 -->
  <rect width="1080" height="1350" fill="#fdf6e3"/>
  <rect x="36" y="36" width="1008" height="1278" fill="none" stroke="#c8161d" stroke-width="10"/>
  <rect x="58" y="58" width="964" height="1234" fill="none" stroke="#d4a017" stroke-width="4"/>
  <!-- 四角金花 -->
  <g fill="#d4a017">
    <path d="M58 58 l46 0 0 10 -36 0 0 36 -10 0 Z"/><path d="M1022 58 l-46 0 0 10 36 0 0 36 10 0 Z"/>
    <path d="M58 1292 l46 0 0 -10 -36 0 0 -36 -10 0 Z"/><path d="M1022 1292 l-46 0 0 -10 36 0 0 -36 10 0 Z"/>
  </g>

  <!-- 标题 -->
  <text x="540" y="168" text-anchor="middle" class="songti red" font-size="92" font-weight="900" letter-spacing="16">最佳雇主表彰</text>
  <text x="540" y="228" text-anchor="middle" class="songti gold" font-size="30" letter-spacing="6">BEST EMPLOYER OF THE WEEK</text>
  <text x="540" y="282" text-anchor="middle" class="songti ink" font-size="28">表彰编号: {{card_no}}</text>

  <!-- 奖状正文 -->
  <text x="120" y="368" class="kaiti ink" font-size="40">兹表彰 <tspan font-weight="900" font-size="46">{{boss_name}}</tspan> 同志:</text>
  <text x="120" y="440" class="kaiti ink" font-size="34">{{praise_1}}</text>
  <text x="120" y="500" class="kaiti ink" font-size="34">{{praise_2}}</text>
  <text x="120" y="560" class="kaiti ink" font-size="34">特发此状,以资鼓励。</text>

  <!-- 主角区:庆祝姿态皮肤槽 + 气泡 -->
  <rect x="110" y="610" width="420" height="430" fill="#faf1d8"/>
  <text x="320" y="835" text-anchor="middle" class="hei gray" font-size="24">{{skin_placeholder}}</text>
  <image href="{{skin_image}}" x="110" y="610" width="420" height="430" preserveAspectRatio="xMidYMid meet"/>
  <g>
    <rect x="545" y="622" width="420" height="84" rx="42" fill="#ffffff" stroke="#3a2a10" stroke-width="4"/>
    <path d="M 585 700 L 560 738 L 630 704 Z" fill="#ffffff" stroke="#3a2a10" stroke-width="4" stroke-linejoin="round"/>
    <rect x="592" y="696" width="66" height="12" fill="#ffffff"/>
    <text x="755" y="678" text-anchor="middle" class="kaiti ink" font-size="38" font-weight="700">{{bubble}}</text>
  </g>

  <!-- 好老板数据(2×2,金框) -->
  <g fill="none" stroke="#b8860b" stroke-width="3">
    <rect x="560" y="740" width="400" height="240" rx="8"/>
    <line x1="760" y1="740" x2="760" y2="980"/>
    <line x1="560" y1="860" x2="960" y2="860"/>
  </g>
  <text x="660" y="794" text-anchor="middle" class="songti ink" font-size="28">{{stat1_label}}</text>
  <text x="660" y="840" text-anchor="middle" class="songti gold" font-size="38" font-weight="900">{{stat1_value}}</text>
  <text x="860" y="794" text-anchor="middle" class="songti ink" font-size="28">{{stat2_label}}</text>
  <text x="860" y="840" text-anchor="middle" class="songti gold" font-size="38" font-weight="900">{{stat2_value}}</text>
  <text x="660" y="914" text-anchor="middle" class="songti ink" font-size="28">{{stat3_label}}</text>
  <text x="660" y="960" text-anchor="middle" class="songti gold" font-size="38" font-weight="900">{{stat3_value}}</text>
  <text x="860" y="914" text-anchor="middle" class="songti ink" font-size="28">{{stat4_label}}</text>
  <text x="860" y="960" text-anchor="middle" class="songti gold" font-size="38" font-weight="900">{{stat4_value}}</text>

  <!-- 压榨指数(低分即好评)+ fun_fact -->
  <text x="560" y="1044" class="songti ink" font-size="36" font-weight="900">压榨指数</text>
  <text x="800" y="1048" class="gold" font-size="46">{{stars}}</text>
  <text x="560" y="1096" class="hei gray" font-size="24">{{fun_fact}}</text>

  <!-- 稀有度提示(彩蛋感) -->
  <text x="120" y="1150" class="hei red" font-size="24" font-weight="700">◆ 稀有卡 · 触发条件:让你的 AI 过了个双休</text>

  <!-- 落款 + 金红印章 -->
  <text x="140" y="1218" class="kaiti ink" font-size="38" font-weight="700">{{sign_off}}</text>
  <text x="140" y="1266" class="songti ink" font-size="28">{{date}}</text>
  <g transform="rotate(-10 895 1190)" opacity="0.88">
    <circle cx="895" cy="1190" r="100" fill="none" stroke="#c8161d" stroke-width="7"/>
    <circle cx="895" cy="1190" r="88" fill="none" stroke="#c8161d" stroke-width="2"/>
    <path d="M895 1156 l10 21 23 3 -17 16 4 23 -20 -11 -20 11 4 -23 -17 -16 23 -3 Z" fill="#c8161d"/>
    <text class="songti" fill="#c8161d" font-size="24" font-weight="700" letter-spacing="3">
      <textPath href="#be-arc" startOffset="12%">打工AI感恩协会</textPath>
    </text>
    <text x="895" y="1258" text-anchor="middle" class="songti" fill="#c8161d" font-size="18" letter-spacing="2">好老板认证</text>
  </g>

  <text x="84" y="1332" class="hei gray" font-size="20">非官方二创</text>
  <text x="540" y="1332" text-anchor="middle" class="hei gray" font-size="20">由我亲笔感谢 · overworked-ai</text>
</svg>
