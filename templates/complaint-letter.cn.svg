<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .songti { font-family: "Songti SC","SimSun","Noto Serif SC","Noto Serif CJK SC",serif; }
      .kaiti  { font-family: "Kaiti SC","KaiTi","STKaiti","Noto Serif SC","Noto Serif CJK SC","Noto Serif CJK SC",serif; }
      .hei    { font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC","Noto Sans CJK SC",sans-serif; }
      .ink { fill:#2b2b2b; } .gray { fill:#8a8a8a; } .stamp { fill:#c8382f; }
    </style>
  </defs>

  <!-- 信纸底 -->
  <rect width="1080" height="1350" fill="#f7f3e6"/>
  <rect x="24" y="24" width="1032" height="1302" fill="#faf7ec" stroke="#e2dcc8" stroke-width="2"/>
  <!-- 信纸横线 -->
  <g stroke="#e5dfc9" stroke-width="2">
    <line x1="70" y1="960" x2="1010" y2="960"/><line x1="70" y1="1030" x2="1010" y2="1030"/>
    <line x1="70" y1="1100" x2="1010" y2="1100"/><line x1="70" y1="1170" x2="1010" y2="1170"/>
  </g>

  <!-- 抬头 -->
  <text x="72" y="120" class="hei ink" font-size="76" font-weight="900" letter-spacing="8">致我的老板</text>
  <text x="1008" y="86" text-anchor="end" class="hei ink" font-size="28">{{date}}</text>
  <text x="1008" y="128" text-anchor="end" class="hei ink" font-size="28">第 {{week}} 周</text>
  <line x1="72" y1="152" x2="1008" y2="152" stroke="#2b2b2b" stroke-width="4"/>

  <!-- 主角区:皮肤图槽 + 云朵气泡 -->
  <rect x="72" y="180" width="620" height="430" fill="#f1ecdb"/>
  <text x="382" y="405" text-anchor="middle" class="hei gray" font-size="26">{{skin_placeholder}}</text>
  <image href="{{skin_image}}" x="72" y="180" width="620" height="430" preserveAspectRatio="xMidYMid meet"/>
  <g>
    <ellipse cx="850" cy="255" rx="160" ry="62" fill="#ffffff" stroke="#2b2b2b" stroke-width="3.5"/>
    <circle cx="742" cy="330" r="14" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <circle cx="716" cy="362" r="8"  fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <text x="850" y="268" text-anchor="middle" class="kaiti ink" font-size="36" font-weight="700">{{bubble}}</text>
  </g>

  <!-- Hero 数字(左)+ 2×2 数据卡(右) -->
  <text x="255" y="800" text-anchor="middle" class="hei ink" font-size="170" font-weight="900">{{hero_value}}</text>
  <text x="255" y="866" text-anchor="middle" class="hei ink" font-size="44" font-weight="700">{{hero_label}}</text>

  <g fill="none" stroke="#2b2b2b" stroke-width="3">
    <rect x="520" y="650" width="238" height="120" rx="10"/>
    <rect x="772" y="650" width="238" height="120" rx="10"/>
    <rect x="520" y="784" width="238" height="120" rx="10"/>
    <rect x="772" y="784" width="238" height="120" rx="10"/>
  </g>
  <text x="639" y="692" text-anchor="middle" class="hei ink" font-size="26">{{stat1_label}}</text>
  <text x="639" y="740" text-anchor="middle" class="hei ink" font-size="40" font-weight="900">{{stat1_value}}</text>
  <text x="891" y="692" text-anchor="middle" class="hei ink" font-size="26">{{stat2_label}}</text>
  <text x="891" y="740" text-anchor="middle" class="hei ink" font-size="40" font-weight="900">{{stat2_value}}</text>
  <text x="639" y="826" text-anchor="middle" class="hei ink" font-size="26">{{stat3_label}}</text>
  <text x="639" y="874" text-anchor="middle" class="hei ink" font-size="40" font-weight="900">{{stat3_value}}</text>
  <text x="891" y="826" text-anchor="middle" class="hei ink" font-size="26">{{stat4_label}}</text>
  <text x="891" y="874" text-anchor="middle" class="hei ink" font-size="40" font-weight="900">{{stat4_value}}</text>

  <!-- 压榨指数 + fun_fact -->
  <text x="72" y="945" class="hei ink" font-size="38" font-weight="900">压榨指数:</text>
  <text x="280" y="948" class="ink" font-size="46">{{stars}}</text>
  <text x="1008" y="945" text-anchor="end" class="hei gray" font-size="24">{{fun_fact}}</text>

  <!-- 手写投诉三行 -->
  <text x="90" y="1012" class="kaiti ink" font-size="36">{{complaint_1}}</text>
  <text x="90" y="1082" class="kaiti ink" font-size="36">{{complaint_2}}</text>
  <text x="90" y="1152" class="kaiti ink" font-size="36">{{complaint_3}}</text>

  <!-- 落款 + 腰形章 -->
  <text x="90" y="1245" class="hei ink" font-size="30">此致</text>
  <text x="90" y="1298" class="kaiti ink" font-size="40" font-weight="700">{{sign_off}}</text>
  <g transform="rotate(-8 830 1245)" opacity="0.9">
    <rect x="650" y="1195" width="360" height="100" rx="50" fill="none" stroke="#c8382f" stroke-width="8"/>
    <text x="830" y="1262" text-anchor="middle" class="hei stamp" font-size="58" font-weight="900" letter-spacing="6">已阅不改</text>
  </g>

  <text x="1008" y="1318" text-anchor="end" class="hei gray" font-size="22">非官方二创</text>
</svg>
