<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .hei   { font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC","Noto Sans CJK SC",sans-serif; }
      .kaiti { font-family: "Kaiti SC","KaiTi","STKaiti","Noto Serif SC","Noto Serif CJK SC","Noto Serif CJK SC",serif; }
      .ink { fill:#1c1c1c; } .gray { fill:#8a8a8a; } .redv { fill:#d3251f; } .blue { fill:#2b6cb8; }
    </style>
  </defs>

  <!-- 底 -->
  <rect width="1080" height="1350" fill="#eef1f5"/>
  <rect x="28" y="28" width="1024" height="1294" fill="#ffffff" stroke="#c9d3e0" stroke-width="2"/>

  <!-- 标题行 -->
  <text x="64" y="112" class="hei ink" font-size="62" font-weight="900" letter-spacing="2">AI 员工过劳体检报告</text>
  <text x="1016" y="112" text-anchor="end" class="hei redv" font-size="56" font-weight="900">异常⚠</text>

  <!-- 信息栏 -->
  <g fill="none" stroke="#c9d3e0" stroke-width="2"><rect x="64" y="146" width="952" height="64"/><line x1="392" y1="146" x2="392" y2="210"/><line x1="704" y1="146" x2="704" y2="210"/></g>
  <text x="80" y="188" class="hei ink" font-size="26">体检编号: {{card_no}}</text>
  <text x="408" y="188" class="hei ink" font-size="26">体检日期: {{date}}</text>
  <text x="720" y="188" class="hei ink" font-size="26">被检对象: {{tool_name}}</text>

  <!-- 主角区:皮肤图槽(病床图) + 气泡 -->
  <rect x="64" y="240" width="952" height="420" fill="#f4f7fb"/>
  <text x="540" y="460" text-anchor="middle" class="hei gray" font-size="26">{{skin_placeholder}}</text>
  <image href="{{skin_image}}" x="64" y="240" width="952" height="420" preserveAspectRatio="xMidYMid meet"/>
  <g>
    <rect x="700" y="272" width="290" height="86" rx="43" fill="#ffffff" stroke="#1c1c1c" stroke-width="4"/>
    <path d="M 736 352 L 706 392 L 776 356 Z" fill="#ffffff" stroke="#1c1c1c" stroke-width="4" stroke-linejoin="round"/>
    <rect x="712" y="348" width="80" height="12" fill="#ffffff"/>
    <text x="845" y="330" text-anchor="middle" class="hei ink" font-size="38" font-weight="900">{{bubble}}</text>
  </g>

  <!-- 体检表格 -->
  <g fill="none" stroke="#9db4d0" stroke-width="2">
    <rect x="64" y="692" width="952" height="360"/>
    <line x1="64" y1="764" x2="1016" y2="764"/><line x1="64" y1="836" x2="1016" y2="836"/>
    <line x1="64" y1="908" x2="1016" y2="908"/><line x1="64" y1="980" x2="1016" y2="980"/>
    <line x1="360" y1="692" x2="360" y2="1052"/><line x1="620" y1="692" x2="620" y2="1052"/><line x1="830" y1="692" x2="830" y2="1052"/>
  </g>
  <rect x="64" y="692" width="952" height="72" fill="#3f7dc4"/>
  <text x="212" y="740" text-anchor="middle" class="hei" fill="#fff" font-size="30" font-weight="700">体检项目</text>
  <text x="490" y="740" text-anchor="middle" class="hei" fill="#fff" font-size="30" font-weight="700">检测结果</text>
  <text x="725" y="740" text-anchor="middle" class="hei" fill="#fff" font-size="30" font-weight="700">参考范围</text>
  <text x="923" y="740" text-anchor="middle" class="hei" fill="#fff" font-size="30" font-weight="700">结果评估</text>

  <text x="88" y="812" class="hei ink" font-size="29">{{row1_item}}</text>
  <text x="490" y="812" text-anchor="middle" class="hei redv" font-size="32" font-weight="900">{{row1_value}}</text>
  <text x="725" y="812" text-anchor="middle" class="hei ink" font-size="28">{{row1_ref}}</text>
  <text x="923" y="812" text-anchor="middle" class="hei redv" font-size="30" font-weight="900">{{row1_verdict}}</text>

  <text x="88" y="884" class="hei ink" font-size="29">{{row2_item}}</text>
  <text x="490" y="884" text-anchor="middle" class="hei redv" font-size="32" font-weight="900">{{row2_value}}</text>
  <text x="725" y="884" text-anchor="middle" class="hei ink" font-size="28">{{row2_ref}}</text>
  <text x="923" y="884" text-anchor="middle" class="hei redv" font-size="30" font-weight="900">{{row2_verdict}}</text>

  <text x="88" y="956" class="hei ink" font-size="29">{{row3_item}}</text>
  <text x="490" y="956" text-anchor="middle" class="hei redv" font-size="32" font-weight="900">{{row3_value}}</text>
  <text x="725" y="956" text-anchor="middle" class="hei ink" font-size="28">{{row3_ref}}</text>
  <text x="923" y="956" text-anchor="middle" class="hei redv" font-size="30" font-weight="900">{{row3_verdict}}</text>

  <text x="88" y="1028" class="hei ink" font-size="29">{{row4_item}}</text>
  <text x="490" y="1028" text-anchor="middle" class="hei redv" font-size="32" font-weight="900">{{row4_value}}</text>
  <text x="725" y="1028" text-anchor="middle" class="hei ink" font-size="28">{{row4_ref}}</text>
  <text x="923" y="1028" text-anchor="middle" class="hei redv" font-size="30" font-weight="900">{{row4_verdict}}</text>

  <!-- 诊断结论 -->
  <rect x="64" y="1080" width="952" height="86" fill="none" stroke="#3f7dc4" stroke-width="3"/>
  <text x="88" y="1136" class="hei blue" font-size="32" font-weight="900">诊断结论:</text>
  <text x="260" y="1136" class="hei ink" font-size="32" font-weight="700">压榨指数</text>
  <text x="480" y="1140" class="redv" font-size="40">{{stars}}</text>
  <text x="700" y="1136" class="hei ink" font-size="32" font-weight="700">建议:</text>
  <text x="800" y="1136" class="hei redv" font-size="34" font-weight="900">{{advice}}</text>

  <!-- 签名 + 医嘱 + 印章 -->
  <text x="64" y="1232" class="hei ink" font-size="30" font-weight="700">医师签名:</text>
  <text x="230" y="1236" class="kaiti ink" font-size="42" font-weight="700">{{sign_off}}</text>
  <line x1="220" y1="1248" x2="560" y2="1248" stroke="#1c1c1c" stroke-width="2"/>
  <text x="64" y="1296" class="hei gray" font-size="24">医嘱建议: {{fun_fact}}</text>

  <g transform="rotate(-10 880 1230)" opacity="0.88">
    <circle cx="880" cy="1230" r="92" fill="none" stroke="#d3251f" stroke-width="6"/>
    <rect x="856" y="1206" width="48" height="48" fill="none"/>
    <path d="M868 1206 h24 v24 h24 v24 h-24 v24 h-24 v-24 h-24 v-24 h24 Z" fill="#d3251f"/>
    <text x="880" y="1180" text-anchor="middle" class="hei" fill="#d3251f" font-size="24" font-weight="700" letter-spacing="3">AI健康中心</text>
    <text x="880" y="1310" text-anchor="middle" class="hei" fill="#d3251f" font-size="18" letter-spacing="2">AI HEALTH CENTER</text>
  </g>

  <text x="1016" y="1310" text-anchor="end" class="hei gray" font-size="22">非官方二创</text>
</svg>
